aid: whiplash
name: Whiplash
description: >-
  Whiplash is a multichannel order fulfillment and third-party logistics (3PL)
  platform providing a REST API for managing orders, SKUs, inventory levels,
  shipments, and returns across warehouse locations. Now operating as RyderShip
  under Ryder System, the platform offers pre-built integrations with leading
  ecommerce platforms including Shopify, and supports omnichannel fulfillment
  for DTC, retail, and wholesale brands.
