apis:
  - aid: whiplash:whiplash-api
    name: Whiplash API
    description: >-
      The Whiplash REST API (now RyderShip API) enables developers to manage
      orders, items, inventory, shipments, consumer returns, customers, and
      notification subscriptions programmatically. The API uses OAuth 2.0
      Bearer token authentication and supports both authorization code and
      client credentials flows.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
